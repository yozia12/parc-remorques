function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(iso){ return !iso ? '—' : new Date(iso).toLocaleString('fr-CA',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function todayCount(){ const t=new Date().toDateString(); return movements.filter(m=>new Date(m.created_at||m.date).toDateString()===t).length; }
function mClass(t){return t==='Entrée'?'mvt-entree':t==='Sortie'?'mvt-sortie':t==='Maintenance'?'mvt-maint':'mvt-modif';}
function detectType(o,n){
  if(n.status==='maintenance')return'Maintenance';
  if((!o||o.status!=='occupe')&&n.status==='occupe')return'Entrée';
  if(o&&o.status==='occupe'&&n.status==='libre')return'Sortie';
  if(n.content&&(!o||!o.content))return'Entrée';
  if(!n.content&&o&&o.content)return'Sortie';
  return'Modification';
}
function getData(id){ return parcData[id]||{status:'libre',content:'',ref:'',date:'',notes:'',operator:''}; }

// ══════════════════════════════════════════════════════
// MOTEUR 3D (THREE.JS)
// ══════════════════════════════════════════════════════
const mapContainer = document.getElementById('mapContainer');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d2010);
// Lumières
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(50, 100, 50);
scene.add(dirLight);

// Caméra et Rendu
const camera = new THREE.PerspectiveCamera(45, mapContainer.clientWidth / mapContainer.clientHeight, 0.1, 1000);
camera.position.set(0, 80, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });

mapContainer.appendChild(renderer.domElement);

// Redimensionnement
window.addEventListener('resize', () => {
    if(!mapContainer.clientWidth) return;
    camera.aspect = mapContainer.clientWidth / mapContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(mapContainer.clientWidth, mapContainer.clientHeight);
});

// Cache des modèles
const gltfLoader = new GLTFLoader();
const loadedModels = {};
const spotMeshes = {}; 
const MAP_SIZE = 100; // Taille virtuelle du terrain (100x100 unités 3D)

// Précharger les modèles
async function preloadModels() {
    setLoadTxt('Chargement des modèles 3D...');
    const filesToLoad = [...new Set(Object.values(MODEL_FILES)), 'usine.glb'];
    
    for (const file of filesToLoad) {
        try {
            const gltf = await gltfLoader.loadAsync(file);
            loadedModels[file] = gltf.scene;
        } catch(e) { console.warn(`Modèle manquant: ${file}`); }
    }
    
    if(loadedModels['usine.glb']) {
        const usine = loadedModels['usine.glb'].clone();
        scene.add(usine);
    }
}

// Boucle d'animation 3D
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

// Raycaster (Gestion des clics et survols 3D)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let drag3D = { on: false, el: null };

mapContainer.addEventListener('mousemove', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ( ( event.clientX - rect.left ) / rect.width ) * 2 - 1;
    mouse.y = - ( ( event.clientY - rect.top ) / rect.height ) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);

    // Mode Édition : Glisser-déposer
    if (drag3D.on && drag3D.el) {
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(floorPlane, intersectPoint);
        drag3D.el.position.copy(intersectPoint);
        return;
    }

    // Mode Normal : Tooltips
    if(isMapEditMode) return;
    const intersects = raycaster.intersectObjects(Object.values(spotMeshes), true);
    
    if (intersects.length > 0) {
        // Trouver la "tuile" parent qui contient les datas
        let obj = intersects[0].object;
        while(obj.parent && !obj.userData.spotId && obj.parent.type !== 'Scene') { obj = obj.parent; }
        
        if(obj.userData.spotId) {
            document.body.style.cursor = 'pointer';
            showTT(event, obj.userData.spotId, obj.userData.num, obj.userData.zone);
        }
    } else {
        document.body.style.cursor = 'default';
        hideTT();
    }
});

mapContainer.addEventListener('mousedown', (event) => {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(Object.values(spotMeshes), true);
    
    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while(obj.parent && !obj.userData.spotId && obj.parent.type !== 'Scene') { obj = obj.parent; }
        
        if(obj.userData.spotId) {
            if (isMapEditMode) {
                // Débuter le drag
                drag3D.on = true;
                drag3D.el = obj;
                controls.enabled = false;
            } else {
                // Ouvrir Modale
                hideTT();
                openModal(obj.userData.spotId, obj.userData.num, obj.userData.zone);
            }
        }
    }
});

mapContainer.addEventListener('mouseup', () => {
    if (drag3D.on) {
        controls.enabled = true;
        // Sauvegarder la position (conversion 3D -> Pourcentage)
        const p = PLACES.find(pl => pl.spotId === drag3D.el.userData.spotId);
        if(p) {
            p.x = ((drag3D.el.position.x + (MAP_SIZE/2)) / MAP_SIZE) * 100;
            p.y = ((drag3D.el.position.z + (MAP_SIZE/2)) / MAP_SIZE) * 100;
        }
        drag3D.on = false;
        drag3D.el = null;
    }
});

// ══════════════════════════════════════════════════════
// RENDER 3D ET GRILLE
// ══════════════════════════════════════════════════════
function render(){ renderGrid(); renderMap3D(); }

function renderMap3D(){
    // Initialiser les tuiles au sol si ce n'est pas fait
    PLACES.filter(p => { const z=ZONES.find(z=>z.id===p.zoneId); return z && z.mapZone===currentMap; }).forEach(place => {
        const zone = ZONES.find(z => z.id === place.zoneId);
        
        if(!spotMeshes[place.spotId]) {
            // Créer une tuile (hitbox + indicateur visuel)
            const geometry = new THREE.PlaneGeometry(zone.mapWidth || 2, zone.mapHeight || 2);
            geometry.rotateX(-Math.PI / 2); // Coucher le plan sur le sol
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
            const tile = new THREE.Mesh(geometry, material);
            
            // Conversion Pourcentages 2D -> Coordonnées 3D
            tile.position.x = (place.x / 100) * MAP_SIZE - (MAP_SIZE/2);
            tile.position.z = (place.y / 100) * MAP_SIZE - (MAP_SIZE/2);
            tile.position.y = 0.1; // Légèrement au dessus du sol
            
            if(zone.mapRotation) tile.rotation.y = THREE.MathUtils.degToRad(-zone.mapRotation);
            
            tile.userData = { spotId: place.spotId, num: place.num, zone: zone };
            scene.add(tile);
            spotMeshes[place.spotId] = tile;
        }
        updateEl3D(place.spotId);
    });
}

function updateEl3D(id) {
    const d = getData(id);
    const tile = spotMeshes[id];
    const zone = ZONES.find(z => id.startsWith(z.id+'-'));
    
    if(tile) {
        // 1. Couleurs de base
        let hexColor = 0x8892a4; // Maint
        if(d.status === 'libre') hexColor = 0x00e5a0;
        else if(d.status === 'occupe') hexColor = zone.color ? parseInt(zone.color.replace('#','0x')) : 0xff6b2b;
        
        tile.material.color.setHex(hexColor);
        tile.material.opacity = isMapEditMode || d.status === 'libre' ? 0.4 : 0.1; // Plus transparent si plein

        // 2. Gestion du modèle 3D
        const oldModel = tile.getObjectByName('composante3d');
        if(oldModel) tile.remove(oldModel);

        if(d.status === 'occupe' && d.content) {
            const fileName = MODEL_FILES[d.content];
            if(fileName && loadedModels[fileName]) {
                const model = loadedModels[fileName].clone();
                model.name = 'composante3d';
                tile.add(model);
            }
        }
    }
    
    // Mettre à jour aussi le DOM HTML de la grille
    document.querySelectorAll(`div.spot[data-spot-id="${id}"]`).forEach(el => el.className = `spot ${d.status}`);
}

// -- RENDER GRILLE HTML (Inchangé) --
function renderGrid(){
  const el=document.getElementById('gridView');el.innerHTML='';
  const rows=[
    {ids:['tailcone','hstab','vstab'], title:'✈️  QUEUE & STABILISATEURS'},
    {ids:['remorque','remorque-vide'], title:'🚛  REMORQUES — Parc principal'},
    {ids:['fwd','béton'],              title:'✈️  FUSELAGE AVANT & BÉTON'},
    {ids:['k','l','m','n'],            title:'✈️  ZONES K / L / M / N'},
    {ids:['rear'],                     title:'✈️  STOCKAGE REAR'},
    {ids:['mirlog1','mirlog2'],        title:'🏗  SITE MIRLOG'},
  ];
  rows.forEach(({ids,title})=>{
    const st=document.createElement('div');st.className='zone-section-title';st.textContent=title;el.appendChild(st);
    const row=document.createElement('div');row.className='group-row';
    ids.forEach(id=>{
      const zone=ZONES.find(z=>z.id===id);
      const block=document.createElement('div');block.className='zone-block';
      block.innerHTML=`<div class="zone-header"><div class="zone-name" style="color:${zone.color}">${zone.icon} ${zone.label}</div><div class="zone-count" id="count-${zone.id}"></div></div>`;
      const body=document.createElement('div');body.className='zone-body';
      for(let i=1;i<=zone.count;i++){
        const sId=`${zone.id}-${i}`,d=getData(sId);
        const div=document.createElement('div');div.className=`spot ${d.status}`;div.dataset.spotId=sId;
        div.innerHTML=`<div class="spot-icon">${zone.icon}</div><div class="spot-id">${i}</div>`;
        div.addEventListener('mouseenter',e=>showTT(e,sId,i,zone));
        div.addEventListener('mousemove',moveTT);div.addEventListener('mouseleave',hideTT);
        div.addEventListener('click',()=>{hideTT();openModal(sId,i,zone);});
        body.appendChild(div);
      }
      block.appendChild(body);row.appendChild(block);
    });
    el.appendChild(row);
  });
}

// --- TOOLTIP ---
const TT=document.getElementById('tooltip');
function showTT(e,id,num,zone){
  if(isMapEditMode)return;
  const d=getData(id);
  let dd='';if(d.date){dd=new Date(d.date).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
  const lb={libre:'🟢 Libre',occupe:'🟠 Occupée',maintenance:'⚪ Maintenance'};
  TT.innerHTML=`
    <div class="tt-id">${zone.label} — #${num}</div>
    <div class="tt-zone">${zone.desc}</div>
    <div style="font-size:.68rem;font-weight:700;margin-bottom:4px">${lb[d.status]||d.status}</div>
    ${d.content?`<div class="tt-row"><span>Contenu</span><span style="font-weight:700">${d.content}</span></div>`:''}
    ${d.ref?`<div class="tt-row"><span>Réf.</span><span style="color:var(--cyan)">${d.ref}</span></div>`:''}
    ${d.operator?`<div class="tt-row"><span>Opérateur</span><span style="color:var(--orange2)">${d.operator}</span></div>`:''}
    ${dd?`<div class="tt-row"><span>Entrée</span><span>${dd}</span></div>`:''}
    <div style="margin-top:5px;font-size:.6rem;color:var(--gris)">Cliquer pour modifier</div>`;
  TT.style.display='block';moveTT(e);
}
function moveTT(e){const x=Math.min(e.clientX+16,window.innerWidth-245);TT.style.left=x+'px';TT.style.top=(e.clientY-10)+'px';}
function hideTT(){TT.style.display='none';}

// --- MODALE ---
let curSpot=null;
function buildContent(zoneId,val,status){
  const wrap=document.getElementById('modalContentWrap');
  const opts=ZONE_CONTENT[zoneId]||[];
  if(status==='libre'){
    wrap.innerHTML=`<div class="content-locked" style="color:var(--gris)"><span>🔒</span><span>— Place libre</span></div>`;return;
  }
  if(opts.length===1){
    const icon=ZONES.find(z=>z.id===zoneId)?.icon||'✈️';
    wrap.innerHTML=`<div class="content-locked" style="color:var(--orange2);border-color:rgba(255,107,43,.2)">${icon} <strong>${opts[0]}</strong></div><input type="hidden" id="modalContent" value="${opts[0]}">`;
  }else{
    wrap.innerHTML=`<select id="modalContent" class="f-base">
      <option value="">— Sélectionner le contenu —</option>
      ${opts.map(o=>`<option value="${o}"${val===o?' selected':''}>${o}</option>`).join('')}
    </select>`;
  }
}

function onStatusChange(){
  if(!curSpot)return;
  const s=document.getElementById('modalStatus').value;
  const v=document.getElementById('modalContent')?.value||'';
  buildContent(curSpot.zone.id,v,s);
  if(s==='libre'){document.getElementById('modalRef').value='';document.getElementById('modalDate').value='';}
  else if(s==='occupe'&&!document.getElementById('modalDate').value){document.getElementById('modalDate').value=new Date().toISOString().slice(0,16);}
}

function openModal(id,num,zone){
  curSpot={id,num,zone};
  const d=getData(id);
  document.getElementById('modalTitle').textContent=`${zone.label} — Place #${num}`;
  document.getElementById('modalZone').textContent=zone.desc;
  document.getElementById('modalStatus').value=d.status;
  document.getElementById('modalRef').value=d.ref;
  document.getElementById('modalDate').value=d.date?d.date.substring(0,16):'';
  document.getElementById('modalOp').value=d.operator||'';
  document.getElementById('modalNotes').value=d.notes;
  document.getElementById('savingInd').textContent='';
  buildContent(zone.id,d.content,d.status);
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){document.getElementById('modalBg').classList.remove('open');curSpot=null;}
function clearModal(){
  document.getElementById('modalStatus').value='libre';
  document.getElementById('modalRef').value='';
  document.getElementById('modalDate').value='';
  document.getElementById('modalOp').value='';
  document.getElementById('modalNotes').value='';
  onStatusChange();
}

function getContent(){
  const opts=ZONE_CONTENT[curSpot?.zone?.id]||[];
  if(opts.length===1)return opts[0];
  return document.getElementById('modalContent')?.value||'';
}

async function saveSpot(){
  if(!curSpot)return;
  const{id,num,zone}=curSpot;
  const old={...getData(id)};
  const nw={
    status:document.getElementById('modalStatus').value,
    content:getContent(),
    ref:document.getElementById('modalRef').value,
    date:document.getElementById('modalDate').value,
    operator:document.getElementById('modalOp').value,
    notes:document.getElementById('modalNotes').value,
  };
  const opts=ZONE_CONTENT[zone.id]||[];
  if(nw.status==='occupe'&&opts.length>1&&!nw.content){
    document.getElementById('savingInd').textContent='⚠️ Sélectionnez un contenu';return;
  }
  const ok=await saveSpotToDB(id,zone.id,num,nw);
  if(!ok)return;
  await logMvt(id,zone.id,num,old,nw);
  parcData[id]=nw;
  updateEl3D(id); // Appel la nouvelle fonction 3D
  updateStats();
  setTimeout(closeModal,700);
}

document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});

// --- SUPABASE CALLS ---
async function loadSpots(){
  setLoadTxt('Chargement des emplacements…');
  const {data,error}=await db.from('spots').select('*');
  if(error){console.error(error);return;}
  parcData={};
  (data||[]).forEach(row=>{
    parcData[row.id]={ status:row.status||'libre', content:row.content||'', ref:row.ref||'', date:row.date_entree||'', notes:row.notes||'', operator:row.operator||'' };
    const p=PLACES.find(pl=>pl.spotId===row.id);
    if(p&&row.pos_x!=null){p.x=row.pos_x;p.y=row.pos_y;}
  });
}

async function saveSpotToDB(spotId,zoneId,num,data){
  setSS('loading','Sauvegarde…');
  document.getElementById('savingInd').textContent='⏳ Enregistrement…';
  const p=PLACES.find(pl=>pl.spotId===spotId);
  const {error}=await db.from('spots').upsert({
    id:spotId, zone_id:zoneId, num:num, status:data.status, content:data.content||null, ref:data.ref||null, client:null, date_entree:data.date||null, notes:data.notes||null, operator:data.operator||null, pos_x:p?p.x:null, pos_y:p?p.y:null, updated_at:new Date().toISOString(),
  });
  if(error){ setSS('error','Erreur sauvegarde'); document.getElementById('savingInd').textContent='❌ '+error.message; return false; }
  setSS('ok','Synchronisé'); document.getElementById('savingInd').textContent='✅ Enregistré !';
  setTimeout(()=>document.getElementById('savingInd').textContent='',2000);
  return true;
}

async function saveLayoutToDB(){
  setSS('loading','Sauvegarde du plan…');
  try{
    const updates=PLACES.map(p=>{
      const d=getData(p.spotId);
      return{id:p.spotId,zone_id:p.zoneId,num:p.num,status:d.status||'libre', content:d.content||null,ref:d.ref||null,client:null, date_entree:d.date||null,notes:d.notes||null, operator:d.operator||null, pos_x:p.x,pos_y:p.y,updated_at:new Date().toISOString()};
    });
    const{error}=await db.from('spots').upsert(updates);
    if(error)throw error;
    alert('✅ Plan sauvegardé !');
    setSS('ok','Synchronisé');
  }catch(err){alert('❌ Erreur : '+(err.message||JSON.stringify(err)));setSS('error','Erreur');}
  document.getElementById('btnEditMap').innerHTML='🔓 Configurer le Plan';
}

async function loadMovements(){
  setLoadTxt('Chargement des mouvements…');
  const {data,error}=await db.from('movements').select('*').order('created_at',{ascending:false}).limit(500);
  if(!error) movements=data||[];
}

async function logMvt(spotId,zoneId,num,old,nw){
  const z=ZONES.find(z=>z.id===zoneId);
  const mvt={ id: uid(), spot_id: spotId, zone_id: zoneId, spot_num: num, zone_label: z?z.label:zoneId, type: detectType(old,nw), ancien_statut: old?old.status:'libre', nouveau_statut: nw.status, content: nw.content||'', ref: nw.ref||'', operator: nw.operator||'', notes: nw.notes||'', created_at: new Date().toISOString(), };
  const{error}=await db.from('movements').insert(mvt);
  if(error) movements.unshift(mvt); else { movements.unshift(mvt); if(movements.length>500)movements=movements.slice(0,500); }
  document.getElementById('countMvtToday').textContent=todayCount();
}

function updateStats(){
  let libre=0,occ=0,total=0;
  ZONES.forEach(z=>{
    let zo=0;
    for(let i=1;i<=z.count;i++){const d=getData(`${z.id}-${i}`);total++;if(d.status==='libre')libre++;else if(d.status==='occupe'){occ++;zo++;}}
    const el=document.getElementById(`count-${z.id}`);if(el)el.textContent=`${zo}/${z.count} occupées`;
  });
  document.getElementById('totalSpots').textContent=total;
  document.getElementById('countLibre').textContent=libre;
  document.getElementById('countOccupe').textContent=occ;
  document.getElementById('countMvtToday').textContent=todayCount();
}

// --- NAVIGATION & UI ---
function switchView(v,btn){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['grid','map','dashboard','mouvements','rapports'].forEach(n=>document.getElementById(n+'View').classList.remove('active'));
  document.getElementById(v+'View').classList.add('active');
  document.getElementById('btnEditMap').style.display=v==='map'?'block':'none';
  if(v!=='map'&&isMapEditMode) toggleMapEdit();
  // Call refresh if needed here...
}

function switchMap(map){
  currentMap=map;
  document.getElementById('mapBtnCour').classList.toggle('active',map==='cour');
  document.getElementById('mapBtnMirlog').classList.toggle('active',map==='mirlog');
  
  // Masquer les objets 3D qui ne sont pas de la bonne map
  Object.values(spotMeshes).forEach(mesh => {
      const z = ZONES.find(zo => zo.id === mesh.userData.zone.id);
      mesh.visible = (z && z.mapZone === map);
  });
}

function toggleMapEdit(){
  isMapEditMode=!isMapEditMode;
  const btn=document.getElementById('btnEditMap');
  document.body.classList.toggle('map-edit-mode',isMapEditMode);
  if(isMapEditMode){
      btn.classList.add('editing');btn.innerHTML='🔒 Sauvegarder le Plan';
      Object.values(spotMeshes).forEach(m => m.material.opacity = 0.5); // Rendre tout visible
  } else {
      btn.classList.remove('editing');btn.innerHTML='⏳ Enregistrement…';
      Object.values(spotMeshes).forEach(m => updateEl3D(m.userData.spotId)); // Remettre bonnes opacités
      saveLayoutToDB();
  }
}

// EXPOSER LES FONCTIONS AU HTML (Obligatoire avec type="module")
window.switchView = switchView;
window.switchMap = switchMap;
window.toggleMapEdit = toggleMapEdit;
window.openModal = openModal;
window.closeModal = closeModal;
window.clearModal = clearModal;
window.saveSpot = saveSpot;
window.onStatusChange = onStatusChange;

async function init(){
  setSS('loading','Connexion…');
  try {
    await preloadModels(); // NOUVEAU: charger la 3D d'abord
    await loadSpots();
    setLoadTxt('Chargement des mouvements…');
    await loadMovements();
    setSS('ok','Synchronisé');
  } catch(e) {
    setSS('error','Erreur connexion');
    console.error(e);
  }
  document.getElementById('loadingScreen').classList.add('hidden');
  render();
  updateStats();
}
init();
