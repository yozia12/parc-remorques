<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Parc Remorques — Plan Interactif</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f1929;
  --orange: #ff6b2b;
  --orange2: #ff9a5c;
  --vert: #00e5a0;
  --cyan: #00d4ff;
  --gris: #8892a4;
  --blanc: #e0e0e0;
}

body {
  background: var(--bg);
  font-family: 'Segoe UI', Arial, sans-serif;
  color: var(--blanc);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--orange);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 { font-size: 1rem; font-weight: 800; color: #fff; }
.header h1 span { color: var(--orange); }

.stats-bar { display: flex; gap: 10px; flex-wrap: wrap; }

.stat-box { text-align: center; background: var(--surface2); border-radius: 6px; padding: 5px 12px; min-width: 60px; }
.stat-box .val { font-size: 1.2rem; font-weight: 800; line-height: 1; }
.stat-box .lbl { font-size: 0.58rem; opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; }
.val.libre { color: var(--vert); }
.val.occupe { color: var(--orange); }
.val.reserve { color: var(--cyan); }

/* SYNC STATUS */
.sync-dot { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--gris); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gris); transition: background 0.3s; }
.dot.ok { background: var(--vert); animation: pulse 2s infinite; }
.dot.loading { background: var(--orange); animation: pulse 0.5s infinite; }
.dot.error { background: #ff4444; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* TOOLBAR & TOGGLES DE VUE */
.toolbar {
  display: flex; gap: 12px; padding: 8px 20px; background: #12192e;
  border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; align-items: center;
}

.view-toggles { display: flex; gap: 8px; }
.view-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: var(--gris); font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.2s;
}
.view-btn:hover { background: rgba(255,255,255,0.05); }
.view-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

.leg { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--gris); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); }

.filter-btn {
  padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: var(--gris); font-size: 0.68rem; cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

/* LOADING SCREEN */
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }
.loading-screen.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,107,43,0.2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen p { font-size: 0.8rem; color: var(--gris); }

/* CONTENEURS DES DEUX VUES */
.main-view { display: none; padding: 16px 20px; flex-direction: column; gap: 14px; flex-grow: 1; }
.main-view.active { display: flex; }

/* VUE 1 : GRILLE (Ton code original) */
.group-row { display: flex; gap: 14px; flex-wrap: wrap; }
.group-row .zone-block { flex: 1; min-width: 180px; }
.zone-block { background: var(--surface); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; overflow: hidden; }
.zone-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); }
.zone-name { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.zone-count { font-size: 0.6rem; color: var(--gris); }
.zone-body { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 5px; }

/* VUE 2 : CARTE (Le plan en fond) */
#mapView { align-items: center; }
#mapContainer {
  position: relative; width: 100%; max-width: 1600px; 
  aspect-ratio: 16 / 9; /* Ajuste si besoin */
  background-image: url('plan-cour.png'); /* LE NOM DE TA PHOTO ICI */
  background-size: contain; background-repeat: no-repeat; background-position: center;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
}

/* STYLE GÉNÉRAL DES PLACES (Utilisé par la grille) */
.spot {
  width: 42px; height: 52px; border-radius: 5px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; font-size: 0.58rem;
  font-weight: 700; transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
  position: relative; user-select: none; border: 2px solid transparent;
}
.spot:hover { transform: scale(1.12); filter: brightness(1.25); z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.spot:active { transform: scale(0.96); }

/* COULEURS DE BASE */
.spot.libre { background: rgba(0,229,160,0.15); border-color: var(--vert); color: var(--vert); }
.spot.occupe { background: rgba(255,107,43,0.18); border-color: var(--orange); color: var(--orange2); }
.spot.reserve { background: rgba(0,212,255,0.13); border-color: var(--cyan); color: var(--cyan); }
.spot.maintenance { background: rgba(136,146,164,0.12); border-color: var(--gris); color: var(--gris); }

.spot-icon { font-size: 0.95rem; margin-bottom: 1px; }
.spot-id { font-size: 0.65rem; font-weight: 800; }

/* STYLE DES PETITS RECTANGLES SUR LA CARTE (Surcharge le style .spot) */
.spot-map {
  position: absolute !important;
  width: 0.8% !important;  /* LARGUEUR DU RECTANGLE */
  height: 3.5% !important; /* HAUTEUR DU RECTANGLE */
  display: block !important; /* Enlève le flex de la grille */
  transform: translate(-50%, -50%); 
  border-radius: 1px !important;
  border: 1px solid rgba(0,0,0,0.3) !important;
}
.spot-map:hover { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 10px rgba(0,0,0,0.8); }
.spot-map:active { transform: translate(-50%, -50%) scale(0.95); }
.spot-map .spot-icon, .spot-map .spot-id { display: none; } /* Cache icônes et textes */

/* Couleurs pleines pour la carte */
.spot-map.libre { background-color: var(--vert) !important; }
.spot-map.occupe { background-color: var(--orange) !important; }
.spot-map.reserve { background-color: var(--cyan) !important; }
.spot-map.maintenance { background-color: var(--gris) !important; }

/* TOOLTIP */
#tooltip { position: fixed; background: #0a1020; border: 1px solid var(--orange); border-radius: 8px; padding: 10px 13px; font-size: 0.72rem; pointer-events: none; z-index: 500; display: none; max-width: 210px; box-shadow: 0 8px 24px rgba(0,0,0,0.7); line-height: 1.5; }
#tooltip .tt-id { font-weight: 800; font-size: 0.88rem; color: var(--orange2); margin-bottom: 3px; }
#tooltip .tt-zone { font-size: 0.62rem; color: var(--gris); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 8px; font-size: 0.68rem; margin-top: 2px; }
#tooltip .tt-row span:first-child { color: var(--gris); }
#tooltip .tt-status { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 0.62rem; font-weight: 700; margin-top: 5px; }
.tt-libre { background: rgba(0,229,160,0.15); color: var(--vert); }
.tt-occupe { background: rgba(255,107,43,0.15); color: var(--orange2); }
.tt-reserve { background: rgba(0,212,255,0.12); color: var(--cyan); }
.tt-maintenance { background: rgba(136,146,164,0.12); color: var(--gris); }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--orange); border-radius: 12px; padding: 22px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 0.95rem; font-weight: 800; color: var(--orange2); margin-bottom: 2px; }
.modal .modal-zone { font-size: 0.62rem; color: var(--gris); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
.modal label { display: block; font-size: 0.68rem; color: #aaa; margin-bottom: 3px; margin-top: 10px; }
.modal input, .modal select { width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 10px; color: var(--blanc); font-size: 0.78rem; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.modal input:focus, .modal select:focus { border-color: var(--orange); }
.modal select option { background: var(--surface); }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.btn { flex: 1; padding: 9px; border-radius: 6px; border: none; font-size: 0.76rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn:hover { opacity: 0.85; }
.btn-save { background: var(--orange); color: #fff; }
.btn-cancel { background: rgba(255,255,255,0.07); color: #ccc; }
.btn-clear { background: rgba(255,50,50,0.15); color: #ff7070; border: 1px solid rgba(255,50,50,0.25); }
.saving-indicator { text-align: center; font-size: 0.68rem; color: var(--gris); margin-top: 8px; min-height: 16px; }

/* Mobile */
@media (max-width: 480px) {
  .spot { width: 36px; height: 46px; }
  .spot-icon { font-size: 0.8rem; }
  .toolbar { padding: 8px 10px; gap: 8px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Connexion à la base de données…</p>
</div>

<div id="tooltip"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Place</h2>
    <div class="modal-zone" id="modalZone"></div>
    <label>Statut</label>
    <select id="modalStatus">
      <option value="libre">🟢 Libre</option>
      <option value="occupe">🟠 Occupée</option>
      <option value="reserve">🔵 Réservée</option>
      <option value="maintenance">⚪ Maintenance</option>
    </select>
    <label>Contenu (type de pièce)</label>
    <input type="text" id="modalContent" placeholder="Ex: Tailcone A320, Aile gauche…">
    <label>Référence / N° de série</label>
    <input type="text" id="modalRef" placeholder="Ex: MSN-4521-TC">
    <label>Client / Compagnie</label>
    <input type="text" id="modalClient" placeholder="Ex: Air France, Airbus…">
    <label>Date d'entrée</label>
    <input type="date" id="modalDate">
    <label>Notes</label>
    <input type="text" id="modalNotes" placeholder="Notes libres…">
    <div class="modal-btns">
      <button class="btn btn-clear" id="btnClear">Vider</button>
      <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn btn-save" onclick="saveSpot()">💾 Enregistrer</button>
    </div>
    <div class="saving-indicator" id="savingIndicator"></div>
  </div>
</div>

<div class="header">
  <div>
    <h1>Parc <span>Remorques</span></h1>
    <div class="sync-dot" id="syncStatus">
      <div class="dot loading" id="syncDot"></div>
      <span id="syncLabel">Connexion…</span>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-box"><div class="val" id="totalSpots">128</div><div class="lbl">Total</div></div>
    <div class="stat-box"><div class="val libre" id="countLibre">—</div><div class="lbl">Libres</div></div>
    <div class="stat-box"><div class="val occupe" id="countOccupe">—</div><div class="lbl">Occupées</div></div>
    <div class="stat-box"><div class="val reserve" id="countReserve">—</div><div class="lbl">Réservées</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="view-toggles">
    <button class="view-btn active" onclick="switchView('grid', this)">🔲 Vue Grille</button>
    <button class="view-btn" onclick="switchView('map', this)">🗺️ Vue Carte</button>
  </div>
  <div class="sep"></div>
  <div class="leg"><div class="leg-dot" style="background:#00e5a0"></div>Libre</div>
  <div class="leg"><div class="leg-dot" style="background:#ff6b2b"></div>Occupée</div>
  <div class="leg"><div class="leg-dot" style="background:#00d4ff"></div>Réservée</div>
  <div class="leg"><div class="leg-dot" style="background:#8892a4"></div>Maintenance</div>
  <div class="sep"></div>
  <button class="filter-btn active" onclick="filterSpots('all',this)">Tout</button>
  <button class="filter-btn" onclick="filterSpots('libre',this)">Libres</button>
  <button class="filter-btn" onclick="filterSpots('occupe',this)">Occupées</button>
  <button class="filter-btn" onclick="filterSpots('reserve',this)">Réservées</button>
</div>

<div class="main-view active" id="gridView"></div>

<div class="main-view" id="mapView">
  <div id="mapContainer"></div>
</div>

<script>
// =============================================
// SUPABASE CONFIG
// =============================================
const SUPABASE_URL = 'https://ddeucqcjrmkasptupohd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZXVjcWNqcm1rYXNwdHVwb2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzE2ODAsImV4cCI6MjA5MDY0NzY4MH0.DNcKFACTd9HKj1pBus5Rt0mRASe6PxBNkVv7we0d-9I';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// ZONES CONFIG
// =============================================
const ZONES = [
  { id:'tailcone',       label:'Zone Tailcone',         count:16, color:'#e84393', icon:'🔩', desc:'Cônes de queue' },
  { id:'hstab',          label:'Zone Hstab',            count:8,  color:'#a78bfa', icon:'✈️', desc:'Stabilisateurs horizontaux' },
  { id:'vstab',          label:'Zone Vstab',            count:8,  color:'#60a5fa', icon:'✈️', desc:'Stabilisateurs verticaux' },
  { id:'remorque',       label:'Zone Remorque',         count:20, color:'#ff6b2b', icon:'🚛', desc:'Remorques générales' },
  { id:'remorque-vide',  label:'Zone Remorque Vide',    count:8,  color:'#fb923c', icon:'🚛', desc:'Remorques vides' },
  { id:'fwd',            label:'Zone FWD',              count:20, color:'#34d399', icon:'📦', desc:'Section avant / Forward' },
  { id:'gravel',         label:'Zone Gravel (MID/Aile)', count:20, color:'#fbbf24', icon:'🪨', desc:'MID ou Ailes' },
  { id:'k',              label:'Zone K',                count:7,  color:'#38bdf8', icon:'🛫', desc:'MID / Ailes — Zone K' },
  { id:'l',              label:'Zone L',                count:7,  color:'#38bdf8', icon:'🛫', desc:'MID / Ailes — Zone L' },
  { id:'m',              label:'Zone M',                count:7,  color:'#38bdf8', icon:'🛫', desc:'MID / Ailes — Zone M' },
  { id:'n',              label:'Zone N',                count:7,  color:'#38bdf8', icon:'🛫', desc:'MID / Ailes — Zone N' },
];

// =============================================
// COORDONNÉES DES RECTANGLES SUR LA CARTE
// (J'ai fait un script qui les auto-génère en haut à gauche pour l'instant)
// =============================================
let PLACES = [];
ZONES.forEach((zone, zIndex) => {
  for(let i=1; i<=zone.count; i++) {
    // ICI TU REMPLACERAS CES LIGNES PAR TES VRAIES COORDONNÉES (X, Y)
    // Ex: { spotId: 'tailcone-1', zoneId: 'tailcone', num: 1, x: 25.4, y: 80.2 },
    PLACES.push({
      spotId: `${zone.id}-${i}`,
      zoneId: zone.id,
      num: i,
      x: 5 + (i * 1.5), // Position X bidon
      y: 10 + (zIndex * 5) // Position Y bidon
    });
  }
});

// =============================================
// STATE & NAVIGATION
// =============================================
let parcData = {};
let currentSpot = null;
let currentFilter = 'all';

function switchView(viewName, btnElement) {
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');
  document.getElementById('gridView').classList.remove('active');
  document.getElementById('mapView').classList.remove('active');
  document.getElementById(viewName + 'View').classList.add('active');
}

// =============================================
// SUPABASE — CHARGEMENT
// =============================================
async function loadFromSupabase() {
  setSyncStatus('loading', 'Chargement…');
  try {
    const { data, error } = await db.from('spots').select('*');
    if (error) throw error;
    parcData = {};
    (data || []).forEach(row => {
      parcData[row.id] = { status: row.status || 'libre', content: row.content || '', ref: row.ref || '', client: row.client || '', date: row.date_entree || '', notes: row.notes || '' };
    });
    setSyncStatus('ok', 'Synchronisé');
    return true;
  } catch(e) {
    setSyncStatus('error', 'Erreur de connexion');
    return false;
  }
}

// =============================================
// SUPABASE — SAUVEGARDE
// =============================================
async function saveToSupabase(spotId, zoneId, num, data) {
  setSyncStatus('loading', 'Sauvegarde…');
  document.getElementById('savingIndicator').textContent = '⏳ Enregistrement…';
  try {
    const { error } = await db.from('spots').upsert({
      id: spotId, zone_id: zoneId, num: num, status: data.status,
      content: data.content, ref: data.ref, client: data.client,
      date_entree: data.date, notes: data.notes, updated_at: new Date().toISOString(),
    });
    if (error) throw error;
    setSyncStatus('ok', 'Synchronisé');
    document.getElementById('savingIndicator').textContent = '✅ Enregistré !';
    setTimeout(() => document.getElementById('savingIndicator').textContent = '', 2000);
    return true;
  } catch(e) {
    setSyncStatus('error', 'Erreur sauvegarde');
    document.getElementById('savingIndicator').textContent = '❌ Erreur — réessaie';
    return false;
  }
}

// =============================================
// REALTIME
// =============================================
function subscribeRealtime() {
  db.channel('spots-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'spots' }, (payload) => {
    const row = payload.new || payload.old;
    if (!row) return;
    if (payload.eventType === 'DELETE') { delete parcData[row.id]; } 
    else { parcData[row.id] = { status: row.status || 'libre', content: row.content || '', ref: row.ref || '', client: row.client || '', date: row.date_entree || '', notes: row.notes || '' }; }
    
    updateSpotElement(row.id);
    updateStats();
  }).subscribe();
}

function updateSpotElement(spotId) {
  // Cette fonction met à jour les couleurs sur la GRILLE et sur la CARTE en même temps
  const elements = document.querySelectorAll(`[data-spot-id="${spotId}"]`);
  const data = getSpotData(spotId);
  elements.forEach(el => {
    if(el.classList.contains('spot-map')) {
      el.className = `spot spot-map ${data.status}`;
    } else {
      el.className = `spot ${data.status}`;
    }
  });
}

function setSyncStatus(type, label) {
  document.getElementById('syncDot').className = 'dot ' + type;
  document.getElementById('syncLabel').textContent = label;
}

function getSpotData(spotId) {
  return parcData[spotId] || { status:'libre', content:'', ref:'', client:'', date:'', notes:'' };
}

// =============================================
// RENDER (GRILLE ET CARTE)
// =============================================
function render() {
  renderGrid();
  renderMap();
  applyFilter();
}

function renderGrid() {
  const gridMain = document.getElementById('gridView');
  gridMain.innerHTML = '';
  const rows = [ ['tailcone','hstab','vstab'], ['remorque','remorque-vide'], ['fwd','gravel'], ['k','l','m','n'] ];

  rows.forEach(ids => {
    const row = document.createElement('div');
    row.className = 'group-row';
    ids.forEach(id => {
      const zone = ZONES.find(z => z.id === id);
      const block = document.createElement('div');
      block.className = 'zone-block';
      block.innerHTML = `<div class="zone-header"><div class="zone-name" style="color:${zone.color}">${zone.icon} ${zone.label}</div><div class="zone-count">${zone.count} places</div></div>`;
      
      const body = document.createElement('div');
      body.className = 'zone-body';
      for (let i = 1; i <= zone.count; i++) {
        const spotId = `${zone.id}-${i}`;
        const data = getSpotData(spotId);
        const div = document.createElement('div');
        div.className = `spot ${data.status}`;
        div.dataset.spotId = spotId;
        div.innerHTML = `<div class="spot-icon">${zone.icon}</div><div class="spot-id">${i}</div>`;
        div.addEventListener('mouseenter', (e) => showTooltip(e, spotId, i, zone));
        div.addEventListener('mousemove', moveTooltip);
        div.addEventListener('mouseleave', hideTooltip);
        div.addEventListener('click', () => { hideTooltip(); openModal(spotId, i, zone); });
        body.appendChild(div);
      }
      block.appendChild(body);
      row.appendChild(block);
    });
    gridMain.appendChild(row);
  });
}

function renderMap() {
  const mapContainer = document.getElementById('mapContainer');
  mapContainer.innerHTML = '';

  PLACES.forEach(place => {
    const zone = ZONES.find(z => z.id === place.zoneId);
    if(!zone) return;
    const data = getSpotData(place.spotId);
    
    const div = document.createElement('div');
    // On ajoute la classe spot-map pour transformer la boîte en petit rectangle
    div.className = `spot spot-map ${data.status}`; 
    div.dataset.spotId = place.spotId;
    div.style.left = `${place.x}%`;
    div.style.top = `${place.y}%`;
    
    div.addEventListener('mouseenter', (e) => showTooltip(e, place.spotId, place.num, zone));
    div.addEventListener('mousemove', moveTooltip);
    div.addEventListener('mouseleave', hideTooltip);
    div.addEventListener('click', () => { hideTooltip(); openModal(place.spotId, place.num, zone); });

    mapContainer.appendChild(div);
  });
}

// =============================================
// TOOLTIP & MODAL
// =============================================
const tooltip = document.getElementById('tooltip');

function showTooltip(e, spotId, num, zone) {
  const data = getSpotData(spotId);
  const labels = { libre:'Libre', occupe:'Occupée', reserve:'Réservée', maintenance:'Maintenance' };
  tooltip.innerHTML = `
    <div class="tt-id">${zone.label} — #${num}</div>
    <div class="tt-zone">${zone.desc}</div>
    <span class="tt-status tt-${data.status}">${labels[data.status]}</span>
    ${data.content ? `<div class="tt-row"><span>Contenu</span><span>${data.content}</span></div>` : ''}
    ${data.client  ? `<div class="tt-row"><span>Client</span><span>${data.client}</span></div>`  : ''}
    ${data.ref     ? `<div class="tt-row"><span>Réf.</span><span>${data.ref}</span></div>`       : ''}
    ${data.date    ? `<div class="tt-row"><span>Entrée</span><span>${data.date}</span></div>`    : ''}
    <div style="margin-top:5px;font-size:0.6rem;color:#555">Appuyer pour modifier</div>
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = Math.min(e.clientX + 16, window.innerWidth - 230);
  tooltip.style.left = x + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function hideTooltip() { tooltip.style.display = 'none'; }

function openModal(spotId, num, zone) {
  currentSpot = { spotId, num, zone };
  const data = getSpotData(spotId);
  document.getElementById('modalTitle').textContent = `${zone.label} — Place #${num}`;
  document.getElementById('modalZone').textContent = zone.desc;
  document.getElementById('modalStatus').value = data.status;
  document.getElementById('modalContent').value = data.content;
  document.getElementById('modalRef').value = data.ref;
  document.getElementById('modalClient').value = data.client;
  document.getElementById('modalDate').value = data.date;
  document.getElementById('modalNotes').value = data.notes;
  document.getElementById('savingIndicator').textContent = '';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  currentSpot = null;
}

async function saveSpot() {
  if (!currentSpot) return;
  const { spotId, num, zone } = currentSpot;
  const data = {
    status:  document.getElementById('modalStatus').value,
    content: document.getElementById('modalContent').value,
    ref:     document.getElementById('modalRef').value,
    client:  document.getElementById('modalClient').value,
    date:    document.getElementById('modalDate').value,
    notes:   document.getElementById('modalNotes').value,
  };
  parcData[spotId] = data;
  updateSpotElement(spotId);
  updateStats();
  const ok = await saveToSupabase(spotId, zone.id, num, data);
  if (ok) setTimeout(closeModal, 800);
}

document.getElementById('btnClear').addEventListener('click', () => {
  ['modalContent','modalRef','modalClient','modalNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalStatus').value = 'libre';
  document.getElementById('modalDate').value = '';
});

document.getElementById('modalBg').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

// =============================================
// FILTER & STATS
// =============================================
function filterSpots(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.spot').forEach(spot => {
    if (currentFilter === 'all') { spot.style.display = ''; } 
    else { spot.style.display = spot.classList.contains(currentFilter) ? '' : 'none'; }
  });
}

function updateStats() {
  let libre = 0, occupe = 0, reserve = 0, total = 0;
  ZONES.forEach(zone => {
    for (let i = 1; i <= zone.count; i++) {
      const d = getSpotData(`${zone.id}-${i}`);
      total++;
      if (d.status === 'libre') libre++;
      else if (d.status === 'occupe') occupe++;
      else if (d.status === 'reserve') reserve++;
    }
  });
  document.getElementById('totalSpots').textContent = total;
  document.getElementById('countLibre').textContent = libre;
  document.getElementById('countOccupe').textContent = occupe;
  document.getElementById('countReserve').textContent = reserve;
}

// =============================================
// INIT
// =============================================
async function init() {
  const ok = await loadFromSupabase();
  document.getElementById('loadingScreen').classList.add('hidden');
  render();
  updateStats();
  if (ok) subscribeRealtime();
}

init();

// =============================================
// OUTIL DE DÉVELOPPEMENT : Cliquer pour copier X/Y
// =============================================
setTimeout(() => {
  const map = document.getElementById('mapContainer');
  if (map) {
    map.addEventListener('click', function(e) {
      if (e.target.closest('.spot-map')) return; 
      const rect = this.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      const codeLigne = `{ spotId: 'ZONE-NUM', zoneId: 'ZONE', num: NUM, x: ${x.toFixed(2)}, y: ${y.toFixed(2)} },`;
      console.log('%c' + codeLigne, 'color: #00e5a0; font-weight: bold; font-size: 14px;');
      navigator.clipboard.writeText(codeLigne).then(() => console.log("Copié !"));
    });
  }
}, 1000);

</script>
